name: Bug report
description: Report a bug in moss-core
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.
        For questions or general discussion, use [Discussions](../discussions) instead.
  - type: input
    id: version
    attributes:
      label: moss-core version
      placeholder: "e.g. 0.1.0"
    validations:
      required: true
  - type: input
    id: rust
    attributes:
      label: Rust version
      placeholder: "rustc --version"
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Smallest code that triggers the bug.
      render: rust
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
